<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEEE EXECOM 2026 — Player Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #a8e063;
            --accent-alt: #56ab2f;
            --accent-glow: rgba(168, 224, 99, 0.3);
            --pink: #e84393;
            --pink-glow: rgba(232, 67, 147, 0.25);
            --bg-body: #0d0d0d;
            --bg-card: #111115;
            --surface: #1a1a22;
            --text: #f0f0f0;
            --text-dim: #5a5a6e;
            --border: rgba(168, 224, 99, 0.12);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-body);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ── Subtle background radials ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 50% 40% at 70% 30%, rgba(168, 224, 99, 0.04), transparent),
                radial-gradient(ellipse 40% 35% at 20% 80%, rgba(232, 67, 147, 0.03), transparent);
            z-index: 0;
        }

        /* ── The poster card ── */
        .poster {
            position: relative;
            z-index: 1;
            width: 440px;
            height: 720px;
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255,255,255,0.04);
            animation: posterEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform: translateY(30px) scale(0.97);
            opacity: 0;
        }

        @keyframes posterEntry {
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* ── Diagonal speed lines (SVG-generated) ── */
        .speed-lines {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .speed-line {
            position: absolute;
            height: 3px;
            border-radius: 2px;
            transform: rotate(-35deg);
            opacity: 0;
            animation: speedLineIn 0.6s ease-out forwards;
        }

        @keyframes speedLineIn {
            to { opacity: 1; }
        }

        /* ── Geometric decorations ── */
        .geo-circle {
            position: absolute;
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
        }

        .geo-circle.c1 {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(168, 224, 99, 0.15);
            top: 100px;
            left: -15px;
            animation: floatSlow 6s ease-in-out infinite;
        }

        .geo-circle.c2 {
            width: 14px;
            height: 14px;
            background: var(--pink);
            top: 180px;
            left: 55px;
            opacity: 0.6;
            animation: floatSlow 5s ease-in-out infinite reverse;
        }

        .geo-circle.c3 {
            width: 8px;
            height: 8px;
            background: var(--accent);
            top: 320px;
            left: 35px;
            opacity: 0.5;
            animation: floatSlow 7s ease-in-out infinite;
        }

        .geo-circle.c4 {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(232, 67, 147, 0.2);
            bottom: 200px;
            right: 20px;
            animation: floatSlow 8s ease-in-out infinite reverse;
        }

        .geo-circle.c5 {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(168, 224, 99, 0.3), transparent 70%);
            top: 70px;
            right: 80px;
        }

        @keyframes floatSlow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* ── Halftone dots pattern ── */
        .halftone {
            position: absolute;
            width: 80px;
            height: 80px;
            z-index: 2;
            pointer-events: none;
            opacity: 0.12;
            background-image: radial-gradient(circle, var(--accent) 1.5px, transparent 1.5px);
            background-size: 8px 8px;
        }

        .halftone.h1 {
            top: 90px;
            left: 20px;
            clip-path: circle(35px at center);
        }

        .halftone.h2 {
            bottom: 180px;
            right: 10px;
            clip-path: polygon(0 0, 100% 0, 100% 60%, 0 100%);
            opacity: 0.06;
        }

        /* ── Top header area ── */
        .header {
            position: relative;
            z-index: 5;
            padding: 24px 28px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .ieee-badge {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-alt), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .ieee-badge span {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 900;
            color: #0a0a0a;
            letter-spacing: 1px;
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-date {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
        }

        /* ── Event / Matchup Title ── */
        .event-section {
            position: relative;
            z-index: 5;
            padding: 10px 28px 0;
        }

        .event-stars {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
        }

        .event-stars span {
            color: var(--accent);
            font-size: 14px;
            text-shadow: 0 0 6px var(--accent-glow);
        }

        .event-teams {
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .event-teams .highlight {
            color: var(--text);
        }

        /* ── Main content area - Player photo + info ── */
        .main-area {
            position: relative;
            z-index: 3;
            height: 310px;
            margin: 10px 0;
            overflow: visible;
        }

        /* Player photo (right side, overlapping) */
        .player-photo {
            position: absolute;
            right: -20px;
            top: -20px;
            width: 300px;
            height: 360px;
            z-index: 4;
            overflow: hidden;
        }

        .player-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        .player-photo .photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 30%, rgba(17,17,21,0.5) 70%, rgba(17,17,21,0.95) 100%);
            pointer-events: none;
        }

        .player-photo .photo-text {
            position: absolute;
            bottom: 30px;
            right: 25px;
            text-align: right;
            z-index: 5;
        }

        .player-photo .photo-text .tag-label {
            font-family: 'Inter', sans-serif;
            font-size: 9px;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .player-photo .photo-text .tag-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Big score / numbers on the left */
        .big-numbers {
            position: absolute;
            left: 22px;
            top: 30px;
            z-index: 5;
        }

        .big-number {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            line-height: 1;
            display: block;
        }

        .big-number.primary {
            font-size: 110px;
            color: transparent;
            -webkit-text-stroke: 2px rgba(168, 224, 99, 0.25);
            position: relative;
        }

        .big-number.primary::after {
            content: attr(data-text);
            position: absolute;
            left: 3px;
            top: 3px;
            -webkit-text-stroke: 0;
            color: rgba(168, 224, 99, 0.06);
        }

        .player-name-big {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1.1;
            margin-top: 8px;
            max-width: 200px;
        }

        .player-name-big .accent-text {
            color: var(--accent);
            display: block;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .player-role {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* ── Sidebar vertical text ── */
        .side-text {
            position: absolute;
            left: 10px;
            bottom: 200px;
            z-index: 6;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* ── Stats bar ── */
        .stats-bar {
            position: relative;
            z-index: 5;
            padding: 0 28px;
            display: flex;
            gap: 16px;
            margin-top: 0px;
        }

        .stat-pill {
            background: var(--surface);
            border: 1px solid rgba(168, 224, 99, 0.08);
            border-radius: 8px;
            padding: 10px 14px;
            flex: 1;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-pill:hover {
            border-color: rgba(168, 224, 99, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .stat-pill .val {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-pill .lbl {
            font-family: 'Inter', sans-serif;
            font-size: 9px;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        /* ── Bottom branding / sponsors strip ── */
        .bottom-section {
            position: relative;
            z-index: 5;
            padding: 18px 28px 0;
        }

        .divider-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(168, 224, 99, 0.15), transparent);
            margin-bottom: 16px;
        }

        .brand-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .brand-item {
            font-family: 'Orbitron', sans-serif;
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .brand-item:hover {
            opacity: 1;
        }

        /* ── Bottom hashtag banner ── */
        .hashtag-banner {
            position: relative;
            z-index: 5;
            margin: 16px 28px 20px;
            padding: 12px 20px;
            background: var(--accent);
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .hashtag-banner span {
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 900;
            color: #0a0a0a;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        /* ── Corner X marks (like the reference) ── */
        .corner-x {
            position: absolute;
            z-index: 6;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 300;
            color: var(--text-dim);
            opacity: 0.3;
            pointer-events: none;
        }

        .corner-x.top-right {
            top: 70px;
            right: 28px;
        }

        .corner-x.bottom-left {
            bottom: 240px;
            left: 28px;
        }

        /* ── Scan lines overlay ── */
        .scanlines {
            position: absolute;
            inset: 0;
            z-index: 8;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.04) 2px,
                rgba(0, 0, 0, 0.04) 4px
            );
        }

        /* ── Subtle noise texture ── */
        .noise {
            position: absolute;
            inset: 0;
            z-index: 7;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 128px 128px;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .poster {
                width: 360px;
                height: 620px;
            }

            .big-number.primary {
                font-size: 80px;
            }

            .player-name-big {
                font-size: 24px;
            }

            .player-photo {
                width: 240px;
                height: 300px;
            }
        }
    </style>
</head>
<body>

    <div class="poster">
        <!-- Overlays -->
        <div class="scanlines"></div>
        <div class="noise"></div>

        <!-- Geometric decorations -->
        <div class="geo-circle c1"></div>
        <div class="geo-circle c2"></div>
        <div class="geo-circle c3"></div>
        <div class="geo-circle c4"></div>
        <div class="geo-circle c5"></div>
        <div class="halftone h1"></div>
        <div class="halftone h2"></div>
        <div class="corner-x top-right">✕</div>
        <div class="corner-x bottom-left">✕</div>

        <!-- Speed lines (generated by JS) -->
        <div class="speed-lines" id="speedLines"></div>

        <!-- Sidebar vertical text -->
        <div class="side-text"># I E E E &nbsp; E X E C O M</div>

        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="ieee-badge"><span>IEEE</span></div>
                <span class="header-title">EXECOM 2026</span>
            </div>
            <span class="header-date">MARCH 2026</span>
        </div>

        <!-- Event matchup line -->
        <div class="event-section">
            <div class="event-stars">
                <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
            </div>
            <p class="event-teams">
                <span class="highlight">VISAT IEEE SB</span> // STUDENT BRANCH
            </p>
        </div>

        <!-- Main area -->
        <div class="main-area">
            <!-- Big outlined number -->
            <div class="big-numbers">
                <span class="big-number primary" data-text="26">26</span>
                <h1 class="player-name-big">
                    GLADYS
                    <span class="accent-text">MANUEL</span>
                </h1>
                <p class="player-role">Chairperson · EXECOM</p>
            </div>

            <!-- Player photo (right side) -->
            <div class="player-photo">
                <img src="GladysManuel.png" alt="Gladys Manuel">
                <div class="photo-overlay"></div>
                <div class="photo-text">
                    <p class="tag-label">TAG/</p>
                    <p class="tag-value">GLADYS</p>
                    <p class="tag-label" style="margin-top:8px">TEAM/</p>
                    <p class="tag-value">VISAT IEEE SB</p>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-pill">
                <div class="val">12</div>
                <div class="lbl">Events</div>
            </div>
            <div class="stat-pill">
                <div class="val">A+</div>
                <div class="lbl">Rank</div>
            </div>
            <div class="stat-pill">
                <div class="val">98</div>
                <div class="lbl">Impact</div>
            </div>
        </div>

        <!-- Bottom section -->
        <div class="bottom-section">
            <div class="divider-line"></div>
            <div class="brand-row">
                <span class="brand-item">IEEE</span>
                <span class="brand-item">·</span>
                <span class="brand-item">Computer Society</span>
                <span class="brand-item">·</span>
                <span class="brand-item">WIE</span>
                <span class="brand-item">·</span>
                <span class="brand-item">RAS</span>
            </div>
        </div>

        <!-- Hashtag banner -->
        <div class="hashtag-banner">
            <span># E X E C O M &nbsp; 2 0 2 6</span>
        </div>
    </div>

    <script>
        // ── Generate diagonal speed lines ──
        const container = document.getElementById('speedLines');
        const lines = [
            // Green accent lines
            { top: '15%', left: '5%', width: '120px', color: 'var(--accent)', opacity: 0.3, delay: 0.2 },
            { top: '22%', left: '8%', width: '180px', color: 'var(--accent)', opacity: 0.15, delay: 0.35 },
            { top: '35%', left: '-5%', width: '250px', color: 'var(--accent)', opacity: 0.1, delay: 0.5 },
            { top: '45%', left: '10%', width: '100px', color: 'var(--accent)', opacity: 0.25, delay: 0.15 },
            { top: '60%', left: '-2%', width: '200px', color: 'var(--accent)', opacity: 0.12, delay: 0.6 },
            { top: '75%', left: '15%', width: '80px', color: 'var(--accent)', opacity: 0.2, delay: 0.4 },
            // Pink accent lines
            { top: '28%', left: '2%', width: '150px', color: 'var(--pink)', opacity: 0.2, delay: 0.3 },
            { top: '50%', left: '12%', width: '90px', color: 'var(--pink)', opacity: 0.25, delay: 0.45 },
            { top: '68%', left: '-3%', width: '170px', color: 'var(--pink)', opacity: 0.15, delay: 0.55 },
            { top: '80%', left: '5%', width: '130px', color: 'var(--pink)', opacity: 0.2, delay: 0.25 },
            // Thin subtle lines
            { top: '18%', left: '20%', width: '60px', color: 'var(--accent)', opacity: 0.08, delay: 0.1 },
            { top: '40%', left: '25%', width: '40px', color: 'var(--pink)', opacity: 0.1, delay: 0.7 },
            { top: '55%', left: '5%', width: '300px', color: 'var(--accent)', opacity: 0.05, delay: 0.8 },
            { top: '72%', left: '20%', width: '50px', color: 'var(--pink)', opacity: 0.12, delay: 0.65 },
        ];

        lines.forEach(l => {
            const el = document.createElement('div');
            el.className = 'speed-line';
            el.style.top = l.top;
            el.style.left = l.left;
            el.style.width = l.width;
            el.style.height = (1 + Math.random() * 2.5) + 'px';
            el.style.background = l.color;
            el.style.opacity = 0;
            el.style.animationDelay = l.delay + 's';
            el.style.setProperty('--final-opacity', l.opacity);
            el.addEventListener('animationend', () => {
                el.style.opacity = l.opacity;
            });
            container.appendChild(el);
        });

        // ── Subtle parallax on mouse move ──
        const poster = document.querySelector('.poster');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            poster.style.transform = `perspective(1000px) rotateY(${x * 2}deg) rotateX(${-y * 2}deg)`;
            poster.style.transition = 'transform 0.15s ease-out';
        });

        document.addEventListener('mouseleave', () => {
            poster.style.transform = 'perspective(1000px) rotateY(0) rotateX(0)';
            poster.style.transition = 'transform 0.4s ease-out';
        });
    </script>
</body>
</html>
